<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>River</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="river-canvas"></canvas>

  <div id="horizon-bar" class="river-bar">
    <div class="hz-scales">
      <button class="hz-btn" data-hours="6">6h</button>
      <button class="hz-btn active" data-hours="24">day</button>
      <button class="hz-btn" data-hours="96">4d</button>
      <button class="hz-btn" data-hours="168">week</button>
      <button class="hz-btn" data-hours="720">month</button>
      <button class="hz-btn" data-hours="2160">qtr</button>
      <button class="hz-btn" data-hours="8760">year</button>
    </div>
    <div class="hz-nav">
      <button class="hz-arrow" id="hz-prev" title="Previous">&#8249;</button>
      <span class="hz-label" id="hz-label">today</span>
      <button class="hz-arrow" id="hz-next" title="Next">&#8250;</button>
    </div>
  </div>

  <div id="wizard-field" class="river-bar wizard-field hidden">
    <div class="wizard-field-zones"></div>
  </div>

  <!-- Hamburger menu -->
  <button id="menu-btn" class="menu-btn" title="Menu">
    <span class="menu-icon">&#9776;</span>
    <span id="menu-dot" class="menu-dot"></span>
  </button>
  <div id="menu-sidebar" class="menu-sidebar hidden">
    <a id="menu-mcp" class="menu-item" href="/mcp" target="_top">
      <span class="menu-item-icon">&#9881;</span>
      MCP Setup
      <span id="menu-mcp-badge" class="menu-badge">set up</span>
    </a>
    <button id="menu-signout" class="menu-item">
      <span class="menu-item-icon">&#8594;</span>
      Sign out
    </button>
  </div>

  <div id="tag-bar" class="tag-bar"></div>
  <button id="plan-btn" class="plan-btn">plan</button>

<div id="quick-add-wrap" class="quick-add-wrap hidden">
  <input type="text" id="quick-add" class="quick-add" placeholder="new thought..." spellcheck="false">
  <div id="quick-add-tags" class="quick-add-tags"></div>
</div>

  <div id="panel" class="panel hidden">
    <label class="panel-label">
      Name
      <input type="text" id="panel-name" class="panel-input" spellcheck="false">
    </label>
    <div class="panel-label">
      <div class="dur-header">
        <span class="dur-title">Duration</span>
        <input type="text" id="panel-dur-input" class="dur-input" spellcheck="false" placeholder="30m">
      </div>
      <div class="panel-durations" id="panel-durations"></div>
    </div>
    <div class="panel-times" id="panel-times" style="display:none">
      <div class="time-group">
        <input type="text" id="panel-start" class="time-pick" spellcheck="false" placeholder="3pm">
        <input type="datetime-local" id="panel-start-picker" class="time-picker-hidden">
        <button class="time-icon" id="panel-start-icon" title="Pick time">&#128197;</button>
      </div>
      <span class="time-arrow">&#8594;</span>
      <div class="time-group">
        <input type="text" id="panel-end" class="time-pick" spellcheck="false" placeholder="5pm">
        <input type="datetime-local" id="panel-end-picker" class="time-picker-hidden">
        <button class="time-icon" id="panel-end-icon" title="Pick time">&#128197;</button>
      </div>
    </div>
    <label class="panel-label">
      Commitment
      <input type="range" id="panel-solidity" min="0" max="100" value="10" class="panel-slider">
    </label>
    <label class="panel-label">
      Energy
      <input type="range" id="panel-energy" min="0" max="100" value="50" class="panel-slider">
    </label>
    <label class="panel-label panel-row">
      <input type="checkbox" id="panel-backtocloud" checked>
      Back to cloud
    </label>
    <div class="panel-label">
      Tags
      <div id="panel-tags" class="panel-tag-checks"></div>
    </div>
    <div class="panel-actions">
      <button id="panel-copy" class="panel-action">Copy</button>
      <button id="panel-dissolve" class="panel-action panel-action-dissolve">Dissolve</button>
    </div>
  </div>

  <script src="supabase.min.js"></script>
  <script>
    // ── Supabase direct client ──────────────────────────────────
    window._riverSB = null;
    window._riverAuthToken = null;
    window._riverUserId = null;
    window._riverTimelineId = null;

    // Supabase config (public keys — safe to inline)
    var SB_URL = 'https://jgbcahwfompeeihxjszb.supabase.co';
    var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnYmNhaHdmb21wZWVpaHhqc3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzQ5OTcsImV4cCI6MjA5MTYxMDk5N30.SqVOAbxkgAk4GINKCr3mcNF05Oxs6z_G4a7Pf1cbzxM';

    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'auth-token') {
        window._riverAuthToken = e.data.token;
        window._riverUserId = e.data.userId || null;
        window._riverTimelineId = e.data.timelineId || null;

        // Create Supabase client with the user's JWT
        if (!window._riverSB) {
          window._riverSB = supabase.createClient(SB_URL, SB_ANON, {
            global: { headers: { Authorization: 'Bearer ' + e.data.token } },
            auth: { persistSession: false, autoRefreshToken: false }
          });
        }

        // If parent preloaded state, apply immediately
        if (e.data.state && window.River && window.River.sync) {
          window.River.state = e.data.state;
          window.River.sync();
        } else if (window.River && window.River.fetchState) {
          window.River.fetchState();
        }

        // Start Realtime subscription
        if (window.River && window.River.connectSSE && !window.River._realtimeChannel) {
          window.River.connectSSE();
        }

        // Check API keys for MCP badge
        window._riverSB.from('api_keys').select('id')
          .eq('user_id', e.data.userId)
          .is('revoked_at', null)
          .then(function(res) {
            var hasKeys = res.data && res.data.length > 0;
            var dot = document.getElementById('menu-dot');
            var badge = document.getElementById('menu-mcp-badge');
            if (dot) dot.className = hasKeys ? 'menu-dot' : 'menu-dot active';
            if (badge) badge.className = hasKeys ? 'menu-badge hidden' : 'menu-badge';
          });
      }
    });

    // Hamburger menu
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('menu-btn');
      var sidebar = document.getElementById('menu-sidebar');
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        sidebar.classList.toggle('hidden');
      });
      document.addEventListener('click', function(e) {
        if (!sidebar.contains(e.target) && e.target !== btn) sidebar.classList.add('hidden');
      });
      document.getElementById('menu-signout').addEventListener('click', function() {
        window.parent.postMessage({ type: 'sign-out' }, '*');
      });
    });
  </script>
  <script src="river-core.js"></script>
  <script src="river-layout.js"></script>
  <script src="river-render.js"></script>
  <script src="river-grid.js"></script>
  <script src="river-blobs.js"></script>
  <script src="river-plan.js"></script>
  <script src="river-store.js"></script>
  <script src="river-panel.js"></script>
  <script src="river-drag-wizard.js"></script>
  <script src="river-input.js"></script>
  <script src="river-main.js"></script>
</body>
</html>
